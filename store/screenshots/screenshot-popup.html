<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Screenshot - Popup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 800px;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  .browser-frame {
    width: 900px;
    background: #1e293b;
    border-radius: 12px;
    box-shadow: 0 25px 80px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  .browser-bar {
    height: 40px;
    background: #334155;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.r { background: #ef4444; }
  .dot.y { background: #eab308; }
  .dot.g { background: #22c55e; }
  .url-bar {
    flex: 1;
    margin: 0 12px;
    height: 26px;
    background: #1e293b;
    border-radius: 6px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    color: #94a3b8;
    font-size: 12px;
  }
  .browser-content {
    height: 500px;
    background: #f8fafc;
    position: relative;
  }
  .popup-overlay {
    position: absolute;
    top: 8px;
    right: 60px;
    width: 320px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    overflow: hidden;
  }
  .popup-header {
    background: linear-gradient(to right, #2563eb, #1d4ed8);
    padding: 12px 16px;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .popup-header h2 { font-size: 14px; font-weight: 600; }
  .popup-header small { font-size: 10px; opacity: 0.7; }
  .popup-body { padding: 12px 16px; }
  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 12px;
    color: #475569;
    border-bottom: 1px solid #f1f5f9;
  }
  .stat-value { font-weight: 600; }
  .stat-value.blue { color: #2563eb; }
  .stat-value.amber { color: #d97706; }
  .stat-value.green { color: #16a34a; }
  .flagged { margin-top: 10px; padding: 8px; }
  .flagged-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #94a3b8;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .flagged-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #475569;
    padding: 4px 8px;
    background: #fffbeb;
    border-radius: 4px;
    margin-bottom: 3px;
  }
  .flagged-dot { color: #f59e0b; font-size: 8px; }
  .nuke-btn {
    display: block;
    width: calc(100% - 32px);
    margin: 12px 16px;
    padding: 10px;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    color: #475569;
    cursor: pointer;
    text-align: center;
  }
  .popup-footer {
    padding: 8px 16px;
    border-top: 1px solid #f1f5f9;
    text-align: center;
    font-size: 10px;
    color: #cbd5e1;
  }
  .kbd {
    background: #f1f5f9;
    border: 1px solid #e2e8f0;
    border-radius: 3px;
    padding: 1px 5px;
    font-family: monospace;
    font-size: 10px;
    color: #475569;
  }
  .label-box {
    position: absolute;
    bottom: 30px;
    left: 50px;
    background: rgba(37, 99, 235, 0.9);
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .label-box span { font-weight: 400; opacity: 0.8; font-size: 13px; display: block; margin-top: 2px; }
</style>
</head>
<body>
  <div class="browser-frame">
    <div class="browser-bar">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
      <div class="url-bar">chrome-extension://... /popup.html</div>
    </div>
    <div class="browser-content">
      <div class="popup-overlay">
        <div class="popup-header">
          <div>
            <h2>☢️ The Nuke</h2>
            <small>v1.0.0</small>
          </div>
          <div style="font-size:14px; opacity:0.7">⚙</div>
        </div>
        <div class="popup-body">
          <div class="stat-row"><span>Monitoring</span><span class="stat-value blue">12 domains</span></div>
          <div class="stat-row"><span>Flagged tabs</span><span class="stat-value amber">3 ⚠</span></div>
          <div class="stat-row"><span>Mode</span><span class="stat-value">Dashboard Overlay</span></div>
          <div class="stat-row" style="border:none"><span>Shortcut</span><span><span class="kbd">Alt+Shift+X</span></span></div>
          <div class="flagged">
            <div class="flagged-title">Flagged Tabs</div>
            <div class="flagged-item"><span class="flagged-dot">●</span> twitter.com</div>
            <div class="flagged-item"><span class="flagged-dot">●</span> reddit.com</div>
            <div class="flagged-item"><span class="flagged-dot">●</span> youtube.com</div>
          </div>
        </div>
        <button class="nuke-btn">🧹 Clean Workspace</button>
        <div class="popup-footer">The Nuke</div>
      </div>
      <div class="label-box">
        Popup UI<span>Hidden panic button with hold-to-activate</span>
      </div>
    </div>
  </div>
</body>
</html>
