<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hero Image</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 900px;
    background: linear-gradient(145deg, #0c0a1a 0%, #1a0e2e 40%, #0f172a 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .glow {
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(239,68,68,0.15) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .icon { font-size: 72px; margin-bottom: 24px; position: relative; z-index: 1; }
  h1 {
    font-size: 64px; font-weight: 800; color: #fff;
    letter-spacing: -0.02em; position: relative; z-index: 1;
    margin-bottom: 16px;
  }
  h1 span { color: #ef4444; }
  .tagline {
    font-size: 22px; color: #94a3b8; font-weight: 400;
    max-width: 600px; text-align: center; line-height: 1.5;
    position: relative; z-index: 1; margin-bottom: 40px;
  }
  .features {
    display: flex; gap: 32px;
    position: relative; z-index: 1;
  }
  .feat {
    display: flex; align-items: center; gap: 10px;
    color: #cbd5e1; font-size: 15px; font-weight: 500;
  }
  .feat .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #ef4444;
  }
  .badge {
    position: absolute;
    bottom: 60px;
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: 24px;
    padding: 8px 20px;
    color: #f87171;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.04em;
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="icon">☢️</div>
  <h1>The <span>Nuke</span></h1>
  <div class="tagline">
    Close targeted tabs, wipe history, and camouflage your screen — in under 200ms.
  </div>
  <div class="features">
    <div class="feat"><div class="dot"></div>One Hotkey</div>
    <div class="feat"><div class="dot"></div>Zero Traces</div>
    <div class="feat"><div class="dot"></div>Instant Camouflage</div>
  </div>
  <div class="badge">CHROME EXTENSION · MANIFEST V3</div>
</body>
</html>
